<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LioraLang Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f7fb;
        color: #1f2a3d;
        font-family: Sora, sans-serif;
      }

      .offline-card {
        width: min(92vw, 420px);
        border: 1px solid #d7dfec;
        border-radius: 16px;
        background: #ffffff;
        padding: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }

      p {
        margin: 0;
        color: #4a5c78;
        line-height: 1.45;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <section class="offline-card">
      <h1>You're offline</h1>
      <p>
        LioraLang is available offline. Reconnect to sync Hub actions and refresh community decks.
      </p>
    </section>
  </body>
</html>
